<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./images/logo.jpeg" type="image/x-icon">
    <title>Bright Future-Courses</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #121212;
        color: #d4af37;
      }
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #1c1c1c;
        padding: 10px 20px;
        box-shadow: 0 2px 10px rgba(212, 175, 55, 0.25);
      }
      .nav-left {
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .navbar .logo img {
        height: 40px;
        cursor: pointer;
      }
      .navbar a {
        color: #d4af37;
        text-decoration: none;
        font-weight: bold;
        transition: 0.2s;
      }
      .navbar a:hover {
        color: #fff;
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .nav-right .welcome {
        font-weight: bold;
      }
      .nav-right button {
        padding: 8px 16px;
        background: #d4af37;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
      }
      .nav-right button:hover {
        background: #c9a635;
      }

      /* Search input */
      .search-container {
        display: flex;
        justify-content: center;
        margin: 30px 0 10px;
      }
      .search-container input {
        width: 90%;
        max-width: 500px;
        padding: 10px 15px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
      }

      .courses-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        padding: 20px;
      }
      .course-card {
        background: #1c1c1c;
        width: 300px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        overflow: hidden;
        color: #fff;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      .course-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(212, 175, 55, 0.6);
      }
      .course-card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
      }
      .course-content {
        padding: 20px;
      }
      .course-content h3 {
        color: #d4af37;
        margin-bottom: 10px;
        font-size: 20px;
      }
      .course-content p {
        font-size: 14px;
        margin-bottom: 15px;
        color: #ccc;
      }
      .course-content .btn {
        display: inline-block;
        padding: 10px 20px;
        background: #d4af37;
        color: #121212;
        font-weight: bold;
        border-radius: 8px;
        text-decoration: none;
        transition: background 0.3s ease;
        cursor: pointer;
      }
      .course-content .btn:hover {
        background: #c9a635;
      }
      .course-content .btn:disabled {
        background: #888;
        cursor: not-allowed;
        color: #fff;
      }
      @media (max-width: 400px) {
        .course-card {
          width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <div class="nav-left">
        <div class="logo"><img src="./images/logo.jpeg" alt="Logo" /></div>
        <a href="#">Home</a>
        <a href="./courses.html">Courses</a>
        <a href="./profile.html">Profile</a>
      </div>
      <div class="nav-right">
        <div class="welcome">Welcome! <span id="username"></span></div>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- Search Input -->
    <div class="search-container">
      <input
        type="text"
        id="courseSearch"
        placeholder="Search for courses..."
        onkeyup="filterCourses()"
      />
    </div>

    <div class="courses-container" id="coursesContainer"></div>

    <script>
      // Ensure user is logged in
      if (!localStorage.getItem("currentUser")) {
        window.location.href = "index.html";
      }
      document.getElementById("username").innerText = localStorage.getItem("currentUser");

      function logout() {
        localStorage.removeItem("currentUser");
        window.location.href = "index.html";
      }

      const allCourses = [
        { name: "MS Word", img: "./images/Web develpment.jpg", desc: "Learn Word basics and document formatting." },
        { name: "MS Excel", img: "./images/Web develpment.jpg", desc: "Master Excel for data and calculations." },
        { name: "MS Powerppoint", img: "./images/Web develpment.jpg", desc: "Create impactful presentations easily." },
        { name: "Canva", img: "./images/Web develpment.jpg", desc: "Design graphics and social media posts." },
        { name: "Graphics Designing", img: "./images/Web develpment.jpg", desc: "Learn visual design principles and tools." },
        { name: "Video Editing", img: "./images/Web develpment.jpg", desc: "Edit videos professionally with software." },
        { name: "Social Media Marketing", img: "./images/Web develpment.jpg", desc: "Promote brands and content online." },
        { name: "Web Development", img: "./images/Web develpment.jpg", desc: "Build websites using HTML, CSS, JS." },
        { name: "PHP Developer", img: "./images/Web develpment.jpg", desc: "Learn backend web development with PHP." },
        { name: "Data Science", img: "./images/Web develpment.jpg", desc: "Analyze data and visualize insights." },
        { name: "Robotics (Arduino)", img: "./images/Web develpment.jpg", desc: "Build and program Arduino robots." },
        { name: "Robotics (ESP32)", img: "./images/Web develpment.jpg", desc: "Control ESP32-based robotics projects." },
        { name: "Robotics (Raspberry PI)", img: "./images/Web develpment.jpg", desc: "Develop Raspberry Pi robotics solutions." },
        { name: "LEGO-Motion Essential", img: "./images/Web develpment.jpg", desc: "Basic LEGO robotics and motion projects." },
        { name: "LEGO-Motion Prime", img: "./images/Web develpment.jpg", desc: "Advanced LEGO robotics programming." },
        { name: "LEGO-EV3", img: "./images/Web develpment.jpg", desc: "Explore EV3 robotics kits and coding." },
        { name: "Mechanical Engineering", img: "./images/Web develpment.jpg", desc: "Learn fundamentals of mechanical design." },
        { name: "Content Creation", img: "./images/Web develpment.jpg", desc: "Create engaging digital content." },
        { name: "Google.Com", img: "./images/Web develpment.jpg", desc: "Master Google search and tools." },
        { name: "Google Drive", img: "./images/Web develpment.jpg", desc: "Organize and share files online." }
      ];

      const container = document.getElementById("coursesContainer");

      // Display courses
      function displayCourses(courses) {
        container.innerHTML = "";
        const user = localStorage.getItem("currentUser");
        const enrolled = JSON.parse(localStorage.getItem("enrolledCourses")) || {};
        const userEnrolled = enrolled[user] || [];

        courses.forEach((course) => {
          const isEnrolled = userEnrolled.some(c => c.name === course.name);
          container.innerHTML += `
            <div class="course-card">
              <img src="${course.img}" alt="${course.name}"/>
              <div class="course-content">
                  <h3>${course.name}</h3>
                  <p>${course.desc}</p>
                  <button class="btn" onclick='enrollCourse(${JSON.stringify(course)})' ${isEnrolled ? "disabled" : ""}>
                    ${isEnrolled ? "Enrolled" : "Enroll Now"}
                  </button>
              </div>
            </div>
          `;
        });
      }

      displayCourses(allCourses);

      // Filter courses
      function filterCourses() {
        const query = document.getElementById("courseSearch").value.toLowerCase();
        const filtered = allCourses.filter(course =>
          course.name.toLowerCase().includes(query)
        );
        displayCourses(filtered);
      }

      // Enroll course with limit and confirm
      function enrollCourse(course) {
        const user = localStorage.getItem("currentUser");
        let enrolled = JSON.parse(localStorage.getItem("enrolledCourses")) || {};
        if (!enrolled[user]) enrolled[user] = [];

        if (enrolled[user].length >= 3) {
          alert("You can enroll in a maximum of 3 courses only!");
          return;
        }

        if (enrolled[user].some(c => c.name === course.name)) {
          alert(`Already enrolled in "${course.name}"`);
          return;
        }

        const confirmEnroll = confirm(`Do you want to enroll in "${course.name}"?`);
        if (confirmEnroll) {
          enrolled[user].push(course);
          localStorage.setItem("enrolledCourses", JSON.stringify(enrolled));
          alert(`Enrolled in "${course.name}"!`);
          displayCourses(allCourses); // Update buttons
        }
      }
    </script>
  </body>
</html>
