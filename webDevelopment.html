<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Lessons</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            min-height: 100vh;
            background: #121212;
            color: #fff;
            overflow-x: hidden;
        }

        /* Hamburger */
        .hamburger {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            width: 35px;
            height: 30px;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            z-index: 1001;
        }

        .hamburger div {
            height: 5px;
            background: #d4af37;
            border-radius: 2px;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #1c1c1c;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .lesson-btn,
        .quiz-btn,
        #certificateBtn {
            padding: 10px 15px;
            background: #2c2c2c;
            border: none;
            border-radius: 5px;
            color: #d4af37;
            cursor: pointer;
            font-weight: bold;
            text-align: left;
            transition: 0.2s;
        }

        .lesson-btn.active,
        .quiz-btn.active {
            background: #d4af37;
            color: #121212;
        }

        .lesson-btn:disabled,
        .quiz-btn:disabled,
        #certificateBtn:disabled {
            background: #555;
            color: #999;
            cursor: not-allowed;
        }

        /* Main content */
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        iframe {
            width: 100%;
            max-width: 100%;
            height: 400px;
            border: none;
        }

        .quiz-container {
            display: none;
            margin-top: 20px;
        }

        .quiz-question {
            margin-bottom: 15px;
        }

        .quiz-question h4 {
            margin-bottom: 5px;
        }

        .quiz-question label {
            display: block;
            margin-bottom: 5px;
            cursor: pointer;
        }

        .btn-submit {
            padding: 10px 20px;
            background: #d4af37;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                transform: translateX(-100%);
                z-index: 1000;
            }

            .sidebar.show {
                transform: translateX(0);
            }

            body.show-sidebar {
                overflow: hidden;
            }
        }

        @media (max-width: 1024px) {
            iframe {
                height: 350px;
            }
        }

        @media (max-width: 480px) {
            iframe {
                height: 250px;
            }

            .btn-submit {
                width: 100%;
                padding: 10px;
            }
        }
    </style>
</head>

<body>

    <!-- Hamburger Button -->
    <div class="hamburger" id="hamburger">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar"></div>

    <!-- Main Content -->
    <div class="content">
        <h2 id="lessonTitle">Select a Lesson</h2>
        <div id="videoContainer"></div>

        <div class="quiz-container" id="quizContainer">
            <form id="quizForm"></form>
            <button type="button" class="btn-submit" id="submitQuizBtn">Submit Quiz</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const lessons = [
            { title: "Lesson 1", video: "https://www.youtube.com/watch?v=sva0ZRfFx4k" },
            { title: "Lesson 2", video: "https://www.youtube.com/watch?v=Se_e5h9vtms" }
        ];

        const quizzes = [
            [
                { q: "1. What is 2 + 2?", options: ["3", "4", "5"], answer: "4" },
                { q: "2. HTML stands for?", options: ["Hyper Text Markup Language", "High Text Machine Language", "Hyper Tool Markup Language"], answer: "Hyper Text Markup Language" }
            ],
            [
                { q: "1. What is 5 + 5?", options: ["10", "9", "11"], answer: "10" },
                { q: "2. CSS stands for?", options: ["Cascading Style Sheets", "Creative Style Sheets", "Computer Style Sheets"], answer: "Cascading Style Sheets" }
            ]
        ];

        let players = [];
        let currentLesson = null;
        let completedVideo = JSON.parse(localStorage.getItem('completedVideo') || JSON.stringify(Array(lessons.length).fill(false)));
        let completedQuiz = JSON.parse(localStorage.getItem('completedQuiz') || JSON.stringify(Array(lessons.length).fill(false)));

        function getVideoId(url) {
            const regExp = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w\-]{11})/;
            const match = url.match(regExp);
            return match ? match[1] : null;
        }

        const sidebar = document.getElementById('sidebar');
        const videoButtons = [];
        const quizButtons = [];

        // Create lesson and quiz buttons
        lessons.forEach((lesson, index) => {
            const videoBtn = document.createElement('button');
            videoBtn.className = 'lesson-btn';
            videoBtn.innerText = lesson.title + " (Video)";
            videoBtn.disabled = index !== 0 && !completedQuiz[index - 1];
            videoBtn.addEventListener('click', () => { showVideo(index); closeSidebar(); });
            sidebar.appendChild(videoBtn);
            videoButtons.push(videoBtn);

            const quizBtn = document.createElement('button');
            quizBtn.className = 'quiz-btn';
            quizBtn.innerText = lesson.title + " (Quiz)";
            quizBtn.disabled = !completedVideo[index];
            quizBtn.addEventListener('click', () => { showQuiz(index); closeSidebar(); });
            sidebar.appendChild(quizBtn);
            quizButtons.push(quizBtn);
        });

        // Hamburger toggle
        const hamburger = document.getElementById('hamburger');
        hamburger.addEventListener('click', () => {
            sidebar.classList.toggle('show');
            document.body.classList.toggle('show-sidebar');
        });
        function closeSidebar() { sidebar.classList.remove('show'); document.body.classList.remove('show-sidebar'); }

        // Show video
        function showVideo(index) {
            currentLesson = index;
            document.querySelectorAll('.lesson-btn, .quiz-btn').forEach(b => b.classList.remove('active'));
            videoButtons[index].classList.add('active');

            const videoId = getVideoId(lessons[index].video);
            if (!videoId) { alert("Invalid YouTube URL!"); return; }

            if (players[index]) { players[index].destroy(); players[index] = null; }

            const playerId = `player${index}_${Date.now()}`;
            document.getElementById('videoContainer').innerHTML = `<div id="${playerId}"></div>`;
            players[index] = new YT.Player(playerId, {
                height: '400',
                width: '100%',
                videoId: videoId,
                playerVars: { autoplay: 1 },
                events: {
                    onStateChange: (event) => {
                        if (event.data === YT.PlayerState.ENDED) {
                            completedVideo[index] = true;
                            quizButtons[index].disabled = false;
                            localStorage.setItem('completedVideo', JSON.stringify(completedVideo));
                            checkCertificateReady();
                            closeSidebar();
                        }
                    }
                }
            });

            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('videoContainer').style.display = 'block';
            document.getElementById('lessonTitle').innerText = lessons[index].title;
        }

        // Show quiz
        function showQuiz(index) {
            if (!completedVideo[index]) { alert("Watch the video first!"); return; }
            currentLesson = index;
            document.querySelectorAll('.lesson-btn, .quiz-btn').forEach(b => b.classList.remove('active'));
            quizButtons[index].classList.add('active');

            const quizContainer = document.getElementById('quizContainer');
            const quizForm = document.getElementById('quizForm');
            quizForm.innerHTML = "";

            quizzes[index].forEach((q, i) => {
                let html = `<div class="quiz-question"><h4>${q.q}</h4>`;
                q.options.forEach(opt => {
                    html += `<label><input type="radio" name="q${i}" value="${opt}"> ${opt}</label>`;
                });
                html += `</div>`;
                quizForm.innerHTML += html;
            });

            document.getElementById('videoContainer').style.display = 'none';
            quizContainer.style.display = 'block';
            document.getElementById('lessonTitle').innerText = lessons[index].title + " - Quiz";
        }

        // Submit quiz
        document.getElementById('submitQuizBtn').addEventListener('click', () => {
            if (currentLesson === null) return;

            const form = document.getElementById('quizForm');
            const qs = quizzes[currentLesson];
            let score = 0;
            qs.forEach((q, i) => {
                const ans = form[`q${i}`]?.value;
                if (ans === q.answer) score++;
            });
            const percent = (score / qs.length) * 100;
            alert(`You scored ${percent}%`);

            if (percent >= 90) {
                completedQuiz[currentLesson] = true;
                localStorage.setItem('completedQuiz', JSON.stringify(completedQuiz));
                if (videoButtons[currentLesson + 1]) videoButtons[currentLesson + 1].disabled = false;
            }
            checkCertificateReady();
        });

        // Certificate button in sidebar using localStorage username
        const sidebarCertificateBtn = document.createElement('button');
        sidebarCertificateBtn.id = 'certificateBtn';
        sidebarCertificateBtn.className = 'lesson-btn';
        sidebarCertificateBtn.innerText = 'Generate Certificate';
        sidebarCertificateBtn.disabled = true;
        sidebarCertificateBtn.addEventListener('click', () => {
            // Get username from localStorage (saved during registration)
            const username = localStorage.getItem('regUser');
            if (!username) {
                alert("Username not found. Please register first.");
                return;
            }

            const canvas = document.createElement('canvas');
            canvas.width = 1000;
            canvas.height = 700;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 10;
            ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);

            ctx.fillStyle = '#000'; ctx.font = '50px Arial'; ctx.textAlign = 'center';
            ctx.fillText('Certificate of Completion', canvas.width / 2, 150);
            ctx.font = '30px Arial'; ctx.fillText('This is to certify that', canvas.width / 2, 250);
            ctx.font = '40px Arial'; ctx.fillText(username, canvas.width / 2, 320);
            ctx.font = '30px Arial'; ctx.fillText('has successfully completed all lessons and quizzes', canvas.width / 2, 400);
            ctx.fillText('Congratulations!', canvas.width / 2, 500);

            const link = document.createElement('a');
            link.download = 'certificate.png';
            link.href = canvas.toDataURL();
            link.click();
            alert("🎉 Certificate generated! Check your downloads.");
        });
        sidebar.appendChild(sidebarCertificateBtn);

        // Check if certificate is ready
        function checkCertificateReady() {
            if (completedVideo.every(v => v) && completedQuiz.every(q => q)) sidebarCertificateBtn.disabled = false;
        }

        // Initial check
        checkCertificateReady();
    </script>

</body>

</html>
