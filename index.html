<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bright Future</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
    }

    /* SPLASH */
    #splash {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0a;
      color: white;
    }

    .container-splash {
      text-align: center;
    }

    .line {
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      margin: 10px auto;
    }

    .line1 {
      font-size: clamp(22px, 3vw, 42px);
      animation: typing1 1.5s steps(12) forwards;
    }

    .line2 {
      font-size: clamp(40px, 6vw, 80px);
      font-weight: 800;
      color: #ff7a00;
      animation: typing2 2s steps(14) forwards;
      animation-delay: 1.5s;
    }

    .line3 {
      font-size: clamp(28px, 5vw, 60px);
      font-weight: 600;
      animation: typing3 2s steps(18) forwards;
      animation-delay: 3.5s;
    }

    @keyframes typing1 {
      to {
        width: 10ch;
      }
    }

    @keyframes typing2 {
      to {
        width: 14ch;
      }
    }

    @keyframes typing3 {
      to {
        width: 20ch;
      }
    }

    /* APP */
    #app {
      display: none;
    }

    .container-box {
      max-width: 900px;
      margin: 40px auto;
    }

    /* PASSWORD */
    .password-wrapper {
      position: relative;
    }

    .toggle-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 14px;
      color: #007bff;
    }
  </style>
</head>

<body>

  <!-- SPLASH -->
  <div id="splash">
    <div class="container-splash">
      <div class="line line1">Welcome to</div>
      <div class="line line2">Bright Future</div>
      <div class="line line3">Online Education</div>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="bg-light min-vh-100">
    <div class="container-box">

      <div class="text-center mb-3">
        <button id="signupBtn" class="btn btn-outline-primary me-2" onclick="showForm('signup')">Sign Up</button>
        <button id="loginBtn" class="btn btn-outline-primary" onclick="showForm('login')">Login</button>
      </div>

      <div class="card shadow-lg border-0">
        <div class="card-header bg-primary text-white text-center">
          <h3 id="formTitle">Login Form</h3>
        </div>

        <div class="card-body">

          <!-- SIGNUP -->
          <form id="signupForm" class="d-none">

            <input class="form-control mb-2" name="firstName" placeholder="First Name" required>
            <input class="form-control mb-2" name="lastName" placeholder="Last Name" required>
            <input class="form-control mb-2" name="fatherName" placeholder="Father Name" required>

            <div class="mb-2">
              <b>Gender:</b><br>
              <input type="radio" name="gender" value="Male" required> Male
              <input type="radio" name="gender" value="Female"> Female
            </div>

            <select class="form-select mb-2" name="qualification" required>
              <option value="">Qualification</option>
              <option>High School</option>
              <option>Intermediate</option>
              <option>Graduate</option>
              <option>Postgraduate</option>
            </select>

            <input type="date" class="form-control mb-2" name="dob" required>

            <input class="form-control mb-2" name="country" placeholder="Country" required>
            <input class="form-control mb-2" name="city" placeholder="City" required>

            <input type="number" class="form-control mb-2" name="phone" placeholder="Phone Number" required>
            <input type="email" class="form-control mb-2" name="email" placeholder="Email" required>

            <select class="form-select mb-2" name="whyJoin" required>
              <option value="">Why Join This Course</option>
              <option>Skill Development</option>
              <option>Career Growth</option>
              <option>Personal Interest</option>
            </select>

            <select class="form-select mb-2" name="computerKnowledge" required>
              <option value="">Computer Knowledge</option>
              <option>Basic</option>
              <option>Intermediate</option>
              <option>Advanced</option>
              <option>No</option>
            </select>

            <input class="form-control mb-2" name="username" placeholder="Username" required>

            <!-- PASSWORD -->
            <div class="password-wrapper mb-2">
              <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
              <span class="toggle-btn" onclick="togglePassword()">Show</span>
            </div>

            <!-- CHECKBOX -->
            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="confirmCheck" required>
              <label class="form-check-label">All information is valid</label>
            </div>

            <button class="btn btn-primary w-100">Register</button>
          </form>

          <!-- LOGIN -->
          <form id="loginForm">
            <input class="form-control mb-2" placeholder="Username" required>
            <input type="password" class="form-control mb-2" placeholder="Password" required>
            <button class="btn btn-success w-100">Login</button>
          </form>

        </div>
      </div>
    </div>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxeZQgliT3DpJ6M7XOKAR7W-yJRUZpp0hN5J8-TK11lV3cuzLlrjAg4yx9LnpTdN3O7sA/exec";

    /* SPLASH */
    setTimeout(() => {
      document.getElementById("splash").style.display = "none";
      document.getElementById("app").style.display = "block";
      showForm("login");
    }, 6000);

    /* SWITCH */
    function showForm(type) {
      const signup = document.getElementById("signupForm");
      const login = document.getElementById("loginForm");
      const title = document.getElementById("formTitle");

      const signupBtn = document.getElementById("signupBtn");
      const loginBtn = document.getElementById("loginBtn");

      signup.classList.add("d-none");
      login.classList.add("d-none");

      // Reset button styles
      signupBtn.classList.remove("btn-primary");
      signupBtn.classList.add("btn-outline-primary");

      loginBtn.classList.remove("btn-primary");
      loginBtn.classList.add("btn-outline-primary");

      if (type === "signup") {
        signup.classList.remove("d-none");
        title.innerText = "Registration Form";

        // Active button
        signupBtn.classList.remove("btn-outline-primary");
        signupBtn.classList.add("btn-primary");

      } else {
        login.classList.remove("d-none");
        title.innerText = "Login Form";

        // Active button
        loginBtn.classList.remove("btn-outline-primary");
        loginBtn.classList.add("btn-primary");
      }
    }

    /* SIGNUP */
    document.getElementById("signupForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const checkbox = document.getElementById("confirmCheck");
      if (!checkbox.checked) {
        alert("Please confirm that all information is valid.");
        return;
      }

      const formData = Object.fromEntries(new FormData(this));

      const res = await fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify(formData)
      });

      const data = await res.json();

      if (data.success) {
        alert("Registered Successfully!");
        this.reset();
      } else {
        alert("Error saving data");
      }
    });

    /* LOGIN */
    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const username = this.querySelector('[placeholder="Username"]').value;
      const password = this.querySelector('[placeholder="Password"]').value;

      const res = await fetch(`${scriptURL}?username=${username}&password=${password}`);
      const data = await res.json();

  if (data.success) {
  // SAVE USER
  localStorage.setItem("currentUser", username);

  alert("Welcome " + username + "!");
  
  // REDIRECT
  window.location.href = "courses.html";
} else {
  alert("Invalid Username or Password");
}
    });

    /* PASSWORD TOGGLE */
    function togglePassword() {
      const pass = document.getElementById("password");
      const btn = document.querySelector(".toggle-btn");

      if (pass.type === "password") {
        pass.type = "text";
        btn.innerText = "Hide";
      } else {
        pass.type = "password";
        btn.innerText = "Show";
      }
    }
  </script>

</body>

</html>
