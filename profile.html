<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./images/logo.jpeg" type="image/x-icon">
    <title>Bright Future-Profile</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #121212;
            color: #d4af37;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1c1c1c;
            padding: 10px 20px;
            box-shadow: 0 2px 10px rgba(212, 175, 55, 0.25);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .navbar .logo img {
            height: 40px;
            cursor: pointer;
        }

        .navbar a {
            color: #d4af37;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .navbar a:hover {
            color: #fff;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-right .welcome {
            font-weight: bold;
        }

        .nav-right button {
            padding: 8px 16px;
            background: #d4af37;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .nav-right button:hover {
            background: #c9a635;
        }

        .courses-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 40px 20px;
        }

        .course-card {
            background: #1c1c1c;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            overflow: hidden;
            color: #fff;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.6);
        }

        .course-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .course-content {
            padding: 20px;
        }

        .course-content h3 {
            color: #d4af37;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .course-content p {
            font-size: 14px;
            margin-bottom: 15px;
            color: #ccc;
        }

        .course-content .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #d4af37;
            color: #121212;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.3s ease;
            cursor: pointer;
        }

        .course-content .btn:hover {
            background: #c9a635;
        }

        @media(max-width:400px) {
            .course-card {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="nav-left">
            <div class="logo"><img src="images/logo.jpeg" alt="Logo" /></div>
            <a href="#">Home</a>
            <a href="courses.html">Courses</a>
            <a href="profile.html">Profile</a>
        </div>
        <div class="nav-right">
            <div class="welcome">Welcome! <span id="username"></span></div>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <h2 style="text-align:center; margin-top:20px;">My Enrolled Courses</h2>
    <div class="courses-container" id="enrolledCoursesContainer"></div>

    <script>
        if (!localStorage.getItem("currentUser")) window.location.href = "index.html";
        const user = localStorage.getItem("currentUser");
        document.getElementById("username").innerText = user;

        function logout() { localStorage.removeItem("currentUser"); window.location.href = "index.html"; }

        // Display enrolled courses
        const enrolled = JSON.parse(localStorage.getItem("enrolledCourses")) || {};
        const myCourses = enrolled[user] || [];
        const container = document.getElementById("enrolledCoursesContainer");

        if (myCourses.length === 0) {
            container.innerHTML = "<p style='color:#ccc;font-size:16px;'>You have not enrolled in any courses yet.</p>";
        } else {
            myCourses.forEach(course => {
                container.innerHTML += `
    <div class="course-card">
      <img src="${course.img}" alt="${course.name} Image"/>
      <div class="course-content">
        <h3>${course.name}</h3>
        <p>${course.desc}</p>
        <button class="btn" onclick="goToCourse('${course.name}')">View Course</button>
      </div>
    </div>
    `;
            });
        }

        function goToCourse(courseName) {
            window.location.href = "webDevelopment.html";
            // window.location.href=`courses/${courseName}.html`;
        }
    </script>

</body>

</html>
